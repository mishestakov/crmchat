# Prod stack для tgdesk.su.
# Контейнеры биндятся только на 127.0.0.1 — наружу торчит только Caddy
# на хосте (см. /etc/caddy/Caddyfile).
#
# Запуск:
#   cp .env.production.example .env.production
#   # заполнить значения
#   docker compose --env-file .env.production -f docker-compose.prod.yml up -d --build

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  api-migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: "no"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    command: ["pnpm", "exec", "drizzle-kit", "push", "--force"]
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      # В docker-сети IPv6 часто кривой/выключен, а Node 24 fetch по умолчанию
      # резолвит AAAA первым → 10-секундный hang на api.telegram.org. Форсим
      # IPv4-first.
      NODE_OPTIONS: --dns-result-order=ipv4first
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      WEB_ORIGIN: ${WEB_ORIGIN}
      TELEGRAM_LOGIN_CLIENT_ID: ${TELEGRAM_LOGIN_CLIENT_ID:-}
      TELEGRAM_LOGIN_CLIENT_SECRET: ${TELEGRAM_LOGIN_CLIENT_SECRET:-}
      TELEGRAM_LOGIN_REDIRECT_URI: ${TELEGRAM_LOGIN_REDIRECT_URI:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET}
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      ENCRYPTION_SECRET: ${ENCRYPTION_SECRET}
      TG_PROXY_URL: ${TG_PROXY_URL:-}
      TDLIB_DATA_DIR: /data/td
    sysctls:
      # enable_ipv6:false на bridge оставляет ::1 loopback в контейнере, и
      # glibc AI_ADDRCONFIG всё равно возвращает AAAA → fetch висит.
      # Жёстко отключаем IPv6 на уровне kernel в этом контейнере.
      - net.ipv6.conf.all.disable_ipv6=1
      - net.ipv6.conf.default.disable_ipv6=1
    extra_hosts:
      # С Timeweb-VPS из MSK доступен только DC2 (149.154.167.220); DC4/DC5
      # (149.154.166.110, 149.154.175.50) и 91.108.4.5 отвечают connect-timeout
      # — вероятно RKN/маршрутизация. DNS api.telegram.org отдаёт round-robin
      # любой DC, поэтому fetch плавающе таймаутил. Pin'ним DC2.
      - "api.telegram.org:149.154.167.220"
    volumes:
      - tdlib-data:/data/td
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      api-migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE: ""
        VITE_TG_CLIENT_ORIGIN: ${VITE_TG_CLIENT_ORIGIN}
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:80"

  tg-client:
    build:
      context: .
      dockerfile: apps/tg-client/Dockerfile
      args:
        TELEGRAM_API_ID: ${TELEGRAM_API_ID}
        TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
        TG_BASE_URL: /
    restart: unless-stopped
    ports:
      - "127.0.0.1:8082:80"

volumes:
  postgres-data:
  tdlib-data:

# Без enable_ipv6:false контейнеры предпочитают IPv6 при getaddrinfo (gai.conf
# default), а IPv6-egress в docker-сети ломанный → fetch на api.telegram.org
# зависает 10 секунд до AbortSignal. Отключаем IPv6 на bridge — IPv6-connect
# мгновенно фейлится, fallback на IPv4 без задержки.
networks:
  default:
    enable_ipv6: false
