server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — TanStack Router рисует все маршруты клиентом
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Хешированные ассеты Vite — кешируем агрессивно
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
