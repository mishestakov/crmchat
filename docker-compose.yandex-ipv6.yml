# Yandex VM prod override.
#
# The base prod compose has conservative Telegram networking fallbacks:
# IPv4-first Node, pinned api.telegram.org, disabled IPv6 on the Docker bridge.
# On this VM Telegram is expected to be reachable from the VM network, and the
# live service currently depends on the IPv6-enabled bridge below.
#
# Deploy with:
#   docker compose --env-file .env.production \
#     -f docker-compose.prod.yml \
#     -f docker-compose.yandex-ipv6.yml \
#     up -d --build

services:
  api:
    build:
      network: host
    environment:
      NODE_OPTIONS: ""
    extra_hosts: !reset []
    sysctls: !reset []
  api-migrate:
    build:
      network: host
  web:
    build:
      network: host

networks:
  default:
    enable_ipv6: true
    ipam:
      config:
        - subnet: fd00:3102::/64
