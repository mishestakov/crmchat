services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: crmchat
      POSTGRES_PASSWORD: crmchat
      POSTGRES_DB: crmchat
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crmchat -d crmchat"]
      interval: 2s
      timeout: 2s
      retries: 10

volumes:
  pgdata:
    name: crmchat_pgdata
